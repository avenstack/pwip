name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (example: v1.0.0)'
        required: true
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: 'false'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME}"
            PRERELEASE="false"
          else
            VERSION="${{ inputs.tag_name }}"
            PRERELEASE="${{ inputs.prerelease }}"
          fi

          if [ -z "$VERSION" ]; then
            echo "tag/version is required" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  build:
    needs: [prepare, test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: .exe
            archive: zip
          - goos: windows
            goarch: arm64
            ext: .exe
            archive: zip

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -e
          mkdir -p build dist package

          BIN_NAME="pwip${{ matrix.ext }}"
          GOFLAGS="-trimpath"
          LDFLAGS="-s -w -X 'main.version=${VERSION}'"

          CGO_ENABLED=0 go build ${GOFLAGS} -ldflags "${LDFLAGS}" -o "build/${BIN_NAME}" .

          PKG_BASE="pwip_${VERSION}_${GOOS}_${GOARCH}"
          PKG_DIR="package/${PKG_BASE}"
          mkdir -p "${PKG_DIR}"

          cp "build/${BIN_NAME}" "${PKG_DIR}/${BIN_NAME}"
          cp README.md LICENSE passwall_config.json passwall_template.txt "${PKG_DIR}/"
          for extra_file in ip.txt ipv6.txt; do
            if [ -f "${extra_file}" ]; then
              cp "${extra_file}" "${PKG_DIR}/"
            fi
          done

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd package && zip -rq "../dist/${PKG_BASE}.zip" "${PKG_BASE}")
          else
            tar -C package -czf "dist/${PKG_BASE}.tar.gz" "${PKG_BASE}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN != '' && secrets.GH_RELEASE_TOKEN || github.token }}
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            dist/*
